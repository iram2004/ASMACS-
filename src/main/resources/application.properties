spring.application.name=asmacs
# ── Base de données MySQL ───────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/asmacs_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=Nanda25.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ─────────────────────────────────────────
# update = crée les tables si elles n'existent pas, les met à jour sinon
# Ne JAMAIS mettre "create" en production (supprime toutes les données)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── Thymeleaf ───────────────────────────────────────────────
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Serveur ─────────────────────────────────────────────────
server.port=8082
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# ── Upload fichiers ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# ── Mail ────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=asmacs@etablissement.cm
spring.mail.password=TON_MOT_DE_PASSE_APP_GMAIL
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Logs ────────────────────────────────────────────────────
logging.level.asmacs.asmacs=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
spring.security.filter.order=10