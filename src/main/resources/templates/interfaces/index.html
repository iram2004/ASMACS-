<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interfaces ASMACS</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <style>
        :root {
            --bg: #f8f9fa;
            --panel: #ffffff;
            --panel-soft: #f1f5f9;
            --text: #111827;
            --muted: #64748b;
            --line: #dbe3ef;
            --primary: #003ec7;
            --primary-soft: #e8efff;
            --radius: 10px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: "Geist", system-ui, sans-serif;
        }

        .shell {
            width: min(1440px, calc(100% - 48px));
            margin: 0 auto;
            padding: 32px 0 56px;
        }

        .topbar {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 24px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--line);
        }

        .eyebrow {
            color: var(--primary);
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        h1 {
            margin: 8px 0 6px;
            font-size: clamp(28px, 4vw, 44px);
            line-height: 1.05;
            letter-spacing: -.03em;
        }

        .lead {
            margin: 0;
            color: var(--muted);
            max-width: 720px;
            line-height: 1.6;
        }

        .counter {
            min-width: 124px;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            text-align: right;
        }

        .counter strong {
            display: block;
            color: var(--primary);
            font-size: 28px;
            line-height: 1;
        }

        .counter span {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 18px;
        }

        .card {
            overflow: hidden;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            color: inherit;
            text-decoration: none;
            transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(0, 62, 199, .45);
            box-shadow: 0 18px 40px rgba(15, 23, 42, .08);
        }

        .thumb {
            height: 190px;
            background: var(--panel-soft);
            border-bottom: 1px solid var(--line);
        }

        .thumb img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top center;
        }

        .content {
            padding: 14px;
        }

        .category {
            display: inline-flex;
            align-items: center;
            min-height: 22px;
            padding: 0 8px;
            border-radius: 999px;
            background: var(--primary-soft);
            color: var(--primary);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .04em;
        }

        .title {
            margin: 10px 0 4px;
            font-size: 16px;
            font-weight: 800;
        }

        .slug {
            overflow: hidden;
            color: var(--muted);
            font-size: 12px;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        @media (max-width: 720px) {
            .shell {
                width: min(100% - 28px, 1440px);
                padding-top: 22px;
            }

            .topbar {
                align-items: flex-start;
                flex-direction: column;
            }

            .counter {
                width: 100%;
                text-align: left;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <header class="topbar">
        <div>
            <div class="eyebrow">Bibliotheque UI</div>
            <h1>Interfaces ASMACS</h1>
            <p class="lead">
                Galerie de previsualisation des interfaces importees depuis le dossier Stitch.
                Ces vues servent de base de migration vers les templates Thymeleaf definitifs.
            </p>
        </div>
        <div class="counter">
            <strong th:text="${#lists.size(pages)}">37</strong>
            <span>Interfaces</span>
        </div>
    </header>

    <section class="grid" aria-label="Liste des interfaces">
        <a class="card"
           th:each="page : ${pages}"
           th:href="@{/interfaces/{slug}(slug=${page.slug})}">
            <div class="thumb">
                <img th:src="@{${page.screenPath}}" th:alt="${page.title}"/>
            </div>
            <div class="content">
                <span class="category" th:text="${page.category}">Categorie</span>
                <div class="title" th:text="${page.title}">Interface</div>
                <div class="slug" th:text="${page.slug}">slug</div>
            </div>
        </a>
    </section>
</main>
</body>
</html>
