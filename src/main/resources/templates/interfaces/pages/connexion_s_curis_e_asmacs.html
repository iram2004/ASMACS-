<h1 class="font-headline-lg text-headline-lg text-on-surface">Connexion Sécurisée</h1>
<p class="font-body-sm text-body-sm text-on-surface-variant">Veuillez vous identifier pour accéder au système.</p>
</div>
<form class="flex flex-col gap-md" action="/interfaces/v_rification_de_s_curit_asmacs" method="get">
<div class="flex flex-col gap-xs relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Identifiant</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline-variant group-focus-within:text-primary transition-colors">badge</span>
<input autocomplete="username" class="w-full bg-transparent border-0 border-b border-outline-variant pl-lg pr-sm py-xs font-mono-data text-mono-data text-on-surface placeholder:text-outline-variant/50 focus:ring-0 focus:border-primary focus:border-b-2 transition-all outline-none" placeholder="ID Institutionnel ou Email" required="" type="text"/>
</div>
</div>
<div class="flex flex-col gap-xs relative group">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase">Mot de passe</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-0 text-outline-variant group-focus-within:text-primary transition-colors">lock</span>
<input autocomplete="current-password" class="w-full bg-transparent border-0 border-b border-outline-variant pl-lg pr-sm py-xs font-mono-data text-mono-data text-on-surface placeholder:text-outline-variant/50 focus:ring-0 focus:border-primary focus:border-b-2 transition-all outline-none" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between pt-xs">
<label class="flex items-center gap-sm cursor-pointer group">
<div class="relative flex items-center">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 bg-transparent transition-all cursor-pointer" type="checkbox"/>
</div>
<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface transition-colors select-none">Rester connecté sur cet appareil</span>
</label>
</div>

<span>Authentification</span>
<span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
