<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Scanner Présences — ASMACS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        :root{--red:#E8300B;--dark:#0B0B0D;--dark2:#111116;--dark3:#17171E;--dark4:#1F1F28;
            --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
            --text:#EDEDF2;--text2:#9898AA;--text3:#555566;
            --green:#22C55E;--gbg:rgba(34,197,94,.12);--gborder:rgba(34,197,94,.28);
            --yellow:#F59E0B;--ybg:rgba(245,158,11,.12);--yborder:rgba(245,158,11,.28);
            --errbg:rgba(239,68,68,.12);--errborder:rgba(239,68,68,.28);--errtxt:#EF4444;
            --r:10px;--r2:14px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--fb);background:var(--dark);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased}
        .topbar{background:var(--dark2);border-bottom:1px solid var(--border);
            padding:.85rem 1.5rem;display:flex;align-items:center;
            justify-content:space-between}
        .tb-brand{font-family:var(--fh);font-weight:800;font-size:1.1rem;
            letter-spacing:.1em;display:flex;align-items:center;gap:.5rem}
        .tb-box{background:var(--red);border-radius:5px;width:28px;height:28px;
            display:flex;align-items:center;justify-content:center;font-size:.9rem}
        .tb-r a{font-size:.8rem;color:var(--text2);text-decoration:none;
            border:1px solid var(--border);border-radius:var(--r);padding:.28rem .7rem}

        .page{max-width:900px;margin:0 auto;padding:1.5rem 1rem 5rem}
        .alert{display:flex;align-items:center;gap:.7rem;padding:.85rem 1rem;
            border-radius:var(--r);font-size:.86rem;margin-bottom:1.2rem}
        .alert-ok{background:var(--gbg);border:1px solid var(--gborder);color:var(--green)}
        .alert-err{background:var(--errbg);border:1px solid var(--errborder);color:var(--errtxt)}

        /* HEADER SÉANCE */
        .seance-header{padding:1.3rem 1.5rem;
            background:linear-gradient(135deg,var(--dark3),#001a0a);
            border:1px solid var(--border);border-radius:var(--r2);
            border-left:4px solid var(--green);margin-bottom:1.5rem;
            display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.8rem}
        .sh-info h2{font-family:var(--fh);font-weight:800;font-size:1.3rem;margin-bottom:.25rem}
        .sh-info p{color:var(--text2);font-size:.84rem}
        .live-dot{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--green)}
        .dot{width:8px;height:8px;background:var(--green);border-radius:50%;
            animation:pulse 1.5s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}
            50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}

        /* STATS RAPIDES */
        .quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;margin-bottom:1.5rem}
        .qs{background:var(--dark2);border:1px solid var(--border);
            border-radius:var(--r2);padding:.9rem 1rem;text-align:center}
        .qs::before{content:'';display:block;height:3px;
            margin-bottom:.6rem;border-radius:2px}
        .qs.p::before{background:var(--green)}
        .qs.a::before{background:var(--errtxt)}
        .qs.r::before{background:var(--yellow)}
        .qs.t::before{background:var(--text2)}
        .qs-val{font-family:var(--fh);font-weight:800;font-size:1.8rem;line-height:1}
        .qs-lbl{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--text2)}

        /* LAYOUT */
        .scanner-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem}
        @media(max-width:700px){.scanner-layout{grid-template-columns:1fr}}

        /* CARD */
        .card{background:var(--dark2);border:1px solid var(--border);
            border-radius:var(--r2);overflow:hidden;margin-bottom:1rem}
        .ch{padding:.82rem 1.2rem;background:var(--dark3);
            border-bottom:1px solid var(--border);
            font-family:var(--fh);font-weight:700;font-size:.84rem;
            text-transform:uppercase;letter-spacing:.05em;
            display:flex;align-items:center;gap:.7rem}
        .cb{padding:1.2rem}

        /* BOUTONS MÉTHODE */
        .method-btns{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:1rem}
        .mbtn{display:flex;flex-direction:column;align-items:center;gap:.4rem;
            padding:.9rem;background:var(--dark4);
            border:2px solid var(--border2);border-radius:var(--r);
            cursor:pointer;transition:all .2s;text-align:center;font-family:var(--fh)}
        .mbtn:hover,.mbtn.sel{border-color:var(--green);background:var(--gbg)}
        .mbtn-ico{font-size:1.5rem}
        .mbtn-name{font-size:.8rem;font-weight:700}

        /* LISTE PRÉSENCE */
        .presence-list{display:flex;flex-direction:column;gap:0}
        .pl-item{display:flex;align-items:center;justify-content:space-between;
            padding:.75rem 1.2rem;border-bottom:1px solid var(--border)}
        .pl-item:last-child{border-bottom:none}
        .pl-info{display:flex;align-items:center;gap:.7rem}
        .pl-avatar{width:34px;height:34px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:.85rem;font-weight:800;flex-shrink:0}
        .av-present{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
        .av-absent{background:var(--errbg);color:var(--errtxt);border:1px solid var(--errborder)}
        .av-retard{background:var(--ybg);color:var(--yellow);border:1px solid var(--yborder)}
        .pl-name{font-weight:600;font-size:.87rem}
        .pl-mat{font-size:.74rem;color:var(--text3);font-family:monospace}
        .pl-actions{display:flex;gap:.4rem}

        .badge{display:inline-flex;align-items:center;gap:.2rem;
            padding:.18rem .55rem;border-radius:20px;font-size:.68rem;font-weight:700}
        .b-p{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
        .b-a{background:var(--errbg);color:var(--errtxt);border:1px solid var(--errborder)}
        .b-r{background:var(--ybg);color:var(--yellow);border:1px solid var(--yborder)}

        .btn{display:inline-flex;align-items:center;gap:.3rem;
            border:none;border-radius:7px;font-family:var(--fh);
            font-weight:700;font-size:.74rem;cursor:pointer;
            text-decoration:none;padding:.28rem .65rem;transition:all .2s}
        .btn-p{background:var(--red);color:#fff}
        .btn-ok{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
        .btn-s{background:var(--dark4);color:var(--text2);border:1px solid var(--border2)}
        .btn-warn{background:var(--ybg);color:var(--yellow);border:1px solid var(--yborder)}

        /* MANUEL */
        .manuelle-form{display:flex;flex-direction:column;gap:.8rem}
        .field{display:flex;flex-direction:column;gap:.32rem}
        .field label{font-size:.71rem;font-weight:600;text-transform:uppercase;
            letter-spacing:.07em;color:var(--text2)}
        .field select,.field input{background:var(--dark4);
            border:1.5px solid var(--border2);border-radius:var(--r);
            color:var(--text);padding:.65rem .9rem;
            font-family:var(--fb);font-size:.88rem;width:100%;outline:none;
            transition:border-color .2s}
        .field select:focus,.field input:focus{border-color:var(--green)}
        .btn-full{width:100%;justify-content:center;padding:.75rem}
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-brand"><div class="tb-box">🛡️</div> Scanner Présences</div>
    <div class="tb-r">
        <a th:href="@{/m02/prof}">← Mes cours</a>
        <a th:href="@{/dashboard}">Dashboard</a>
    </div>
</div>

<div class="page">

    <div th:if="${succes}" class="alert alert-ok">
        <span>✅</span> <span th:text="${succes}"></span>
    </div>
    <div th:if="${erreur}" class="alert alert-err">
        <span>⚠️</span> <span th:text="${erreur}"></span>
    </div>

    <!-- EN-TÊTE SÉANCE -->
    <div class="seance-header">
        <div class="sh-info">
            <h2 th:text="${seance.matiereNom} + ' — ' + ${seance.classeNom}">Cours</h2>
            <p th:text="${seance.enseignantNom} + ' · ' +
          ${#temporals.format(seance.dateSeance,'dd/MM/yyyy')} +
          ' · ' + ${seance.heureDebut}">Infos séance</p>
        </div>
        <div>
            <div class="live-dot">
                <span class="dot"></span>
                <span th:text="${seance.statut}">EN_COURS</span>
            </div>
            <div style="font-size:.78rem;color:var(--text3);margin-top:.3rem"
                 th:text="'Salle : ' + ${seance.salle ?: '—'}"></div>
        </div>
    </div>

    <!-- STATS RAPIDES -->
    <div class="quick-stats">
        <div class="qs p">
            <div class="qs-val" th:text="${seance.nbPresents}">0</div>
            <div class="qs-lbl">Présents</div>
        </div>
        <div class="qs a">
            <div class="qs-val" th:text="${seance.nbAbsents}">0</div>
            <div class="qs-lbl">Absents</div>
        </div>
        <div class="qs r">
            <div class="qs-val" th:text="${seance.nbRetards}">0</div>
            <div class="qs-lbl">Retards</div>
        </div>
        <div class="qs t">
            <div class="qs-val" th:text="${seance.nbTotal}">0</div>
            <div class="qs-lbl">Total</div>
        </div>
    </div>

    <!-- LAYOUT SCANNER + LISTE -->
    <div class="scanner-layout">

        <!-- PANNEAU GAUCHE : Saisie manuelle -->
        <div>
            <div class="card">
                <div class="ch"><span>📝</span> Saisie manuelle</div>
                <div class="cb">
                    <form th:action="@{/m02/prof/marquer}" method="post"
                          class="manuelle-form">
                        <input type="hidden" name="seanceId"
                               th:value="${seance.id}"/>
                        <div class="field">
                            <label>Étudiant</label>
                            <select name="eleveId" required>
                                <option value="">-- Sélectionner --</option>
                                <option th:each="p : ${presences}"
                                        th:value="${p.eleveId}"
                                        th:text="${p.nomComplet} + ' (' + ${p.eleveMatricule} + ')'"></option>
                            </select>
                        </div>
                        <div class="field">
                            <label>Statut</label>
                            <select name="statut">
                                <option value="PRESENT">✅ Présent</option>
                                <option value="RETARD">⏱ Retard</option>
                                <option value="ABSENT">❌ Absent</option>
                            </select>
                        </div>
                        <input type="hidden" name="methode" value="MANUEL"/>
                        <button type="submit" class="btn btn-ok btn-full">
                            ✅ Enregistrer présence
                        </button>
                    </form>
                </div>
            </div>

            <!-- QR CODE -->
            <div class="card" th:if="${seance.qrCodeToken != null}">
                <div class="ch"><span>📱</span> QR Code séance</div>
                <div class="cb" style="text-align:center">
                    <div style="font-family:monospace;font-size:1.3rem;font-weight:800;
                      color:var(--green);background:var(--dark4);
                      padding:.5rem 1rem;border-radius:var(--r);
                      display:inline-block;letter-spacing:.2em;margin-bottom:.8rem"
                         th:text="${seance.qrCodeToken}"></div>
                    <div style="font-size:.8rem;color:var(--text2);margin-bottom:.8rem">
                        Les étudiants scannent ce code avec leur téléphone
                    </div>
                    <a th:href="@{/m02/qrcode/{id}(id=${seance.id})}"
                       class="btn btn-ok"
                       style="width:100%;justify-content:center">
                        📱 Afficher grand QR Code
                    </a>
                </div>
            </div>
        </div>

        <!-- PANNEAU DROIT : Liste présences -->
        <div class="card">
            <div class="ch">
                <span>👥</span>
                <span th:text="'Liste (' + ${presences.size()} + ')'">Liste</span>
            </div>
            <div class="presence-list">
                <div th:each="p : ${presences}" class="pl-item">
                    <div class="pl-info">
                        <div th:class="${p.present} ? 'pl-avatar av-present' :
                            ${p.retard} ? 'pl-avatar av-retard' :
                            'pl-avatar av-absent'">
                            <span th:text="${p.present} ? '✓' : ${p.retard} ? '⏱' : '✗'"></span>
                        </div>
                        <div>
                            <div class="pl-name" th:text="${p.nomComplet}"></div>
                            <div class="pl-mat" th:text="${p.eleveMatricule}"></div>
                            <div th:if="${p.heureArrivee != null}"
                                 style="font-size:.72rem;color:var(--text3)"
                                 th:text="'Arrivée : ' + ${#temporals.format(p.heureArrivee,'HH:mm')}"></div>
                        </div>
                    </div>
                    <div class="pl-actions">
            <span th:switch="${p.statut}">
              <span th:case="'PRESENT'" class="badge b-p">✓</span>
              <span th:case="'RETARD'"  class="badge b-r">⏱</span>
              <span th:case="'ABSENT'"  class="badge b-a">✗</span>
            </span>
                        <!-- Modifier rapide -->
                        <form th:action="@{/m02/prof/modifier-presence}" method="post"
                              style="display:inline">
                            <input type="hidden" name="presenceId" th:value="${p.id}"/>
                            <input type="hidden" name="seanceId" th:value="${seance.id}"/>
                            <select name="statut"
                                    th:value="${p.statut}"
                                    onchange="this.form.submit()"
                                    style="background:var(--dark4);border:1px solid var(--border2);
                             border-radius:6px;color:var(--text);padding:.2rem .4rem;
                             font-size:.72rem;cursor:pointer;outline:none">
                                <option value="PRESENT" th:selected="${p.present}">Présent</option>
                                <option value="RETARD"  th:selected="${p.retard}">Retard</option>
                                <option value="ABSENT"  th:selected="${p.absent}">Absent</option>
                            </select>
                        </form>
                    </div>
                </div>
                <div th:if="${presences.isEmpty()}"
                     style="padding:2rem;text-align:center;color:var(--text3);font-size:.84rem">
                    Aucun étudiant dans cette séance
                </div>
            </div>
        </div>

    </div>

</div>
</body>
</html>
