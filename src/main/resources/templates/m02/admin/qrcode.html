<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>QR Code Séance — ASMACS</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root{--red:#E8300B;--dark:#0B0B0D;--dark2:#111116;--dark3:#17171E;--dark4:#1F1F28;
            --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
            --text:#EDEDF2;--text2:#9898AA;--text3:#555566;
            --green:#22C55E;--gbg:rgba(34,197,94,.12);--gborder:rgba(34,197,94,.28);
            --r:10px;--r2:14px;--fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--fb);background:var(--dark);color:var(--text);
            min-height:100vh;-webkit-font-smoothing:antialiased}
        .topbar{background:var(--dark2);border-bottom:1px solid var(--border);
            padding:.9rem 2rem;display:flex;align-items:center;justify-content:space-between}
        .tb-brand{font-family:var(--fh);font-weight:800;font-size:1.2rem;
            letter-spacing:.12em;display:flex;align-items:center;gap:.5rem}
        .tb-box{background:var(--red);border-radius:5px;width:30px;height:30px;
            display:flex;align-items:center;justify-content:center;font-size:.95rem}
        .tb-r{display:flex;align-items:center;gap:.8rem}
        .tb-r a{font-size:.82rem;color:var(--text2);text-decoration:none;
            border:1px solid var(--border);border-radius:var(--r);padding:.3rem .8rem;
            transition:all .2s}
        .tb-r a:hover{border-color:var(--red);color:var(--red)}
        .page{max-width:560px;margin:0 auto;padding:2.5rem 1.5rem}
        .qr-card{background:var(--dark2);border:1px solid var(--border);
            border-radius:var(--r2);overflow:hidden;text-align:center}
        .qr-head{padding:1.3rem;background:var(--dark3);
            border-bottom:1px solid var(--border)}
        .qr-head h2{font-family:var(--fh);font-weight:800;font-size:1.3rem;margin-bottom:.3rem}
        .qr-head p{color:var(--text2);font-size:.85rem}
        .qr-body{padding:2rem}
        #qrcode-canvas{margin:0 auto 1.2rem;
            background:white;padding:12px;border-radius:var(--r);
            display:inline-block}
        .token-display{background:var(--dark4);border:1px solid var(--gborder);
            border-radius:var(--r);padding:.7rem 1rem;
            font-family:'Courier New',monospace;font-size:1.3rem;
            font-weight:800;color:var(--green);letter-spacing:.2em;
            display:inline-block;margin-bottom:1rem}
        .seance-info{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.2rem}
        .si-item{background:var(--dark3);border:1px solid var(--border);
            border-radius:var(--r);padding:.6rem .9rem;font-size:.82rem}
        .si-lbl{color:var(--text3);font-size:.68rem;text-transform:uppercase;
            letter-spacing:.07em;margin-bottom:.1rem}
        .si-val{font-weight:600}
        .btn{display:inline-flex;align-items:center;gap:.4rem;
            border:none;border-radius:var(--r);font-family:var(--fh);
            font-weight:700;font-size:.88rem;cursor:pointer;
            text-decoration:none;padding:.75rem 1.4rem;transition:all .2s}
        .btn-p{background:var(--red);color:#fff}
        .btn-p:hover{background:#B52208}
        .btn-ok{background:var(--gbg);color:var(--green);border:1px solid var(--gborder)}
        .btn-s{background:var(--dark4);color:var(--text2);border:1px solid var(--border2)}
        .btn-row{display:flex;gap:.7rem;justify-content:center;flex-wrap:wrap}
        .refresh-info{font-size:.78rem;color:var(--text3);margin-top:1rem}
    </style>
</head>
<body>

<div class="topbar">
    <div class="tb-brand"><div class="tb-box">🛡️</div> ASMACS · QR Code</div>
    <div class="tb-r">
        <a th:href="@{/m02/seance/{id}(id=${seance.id})}">← Retour séance</a>
        <a th:href="@{/m02}">Dashboard</a>
    </div>
</div>

<div class="page">
    <div class="qr-card">
        <div class="qr-head">
            <h2>📱 QR Code de Pointage</h2>
            <p th:text="${seance.matiereNom} + ' — ' + ${seance.classeNom}">Cours</p>
        </div>
        <div class="qr-body">

            <div class="seance-info">
                <div class="si-item">
                    <div class="si-lbl">Date</div>
                    <div class="si-val"
                         th:text="${#temporals.format(seance.dateSeance,'dd/MM/yyyy')}"></div>
                </div>
                <div class="si-item">
                    <div class="si-lbl">Heure</div>
                    <div class="si-val" th:text="${seance.heureDebut}"></div>
                </div>
                <div class="si-item">
                    <div class="si-lbl">Salle</div>
                    <div class="si-val" th:text="${seance.salle ?: '—'}"></div>
                </div>
                <div class="si-item">
                    <div class="si-lbl">Statut</div>
                    <div class="si-val" th:text="${seance.statut}"></div>
                </div>
            </div>

            <!-- QR CODE généré par JS -->
            <div id="qrcode-canvas"></div>

            <div class="token-display" th:text="${seance.qrCodeToken ?: 'AUCUN TOKEN'}">
                TOKEN
            </div>

            <p style="font-size:.82rem;color:var(--text2);margin-bottom:1.2rem">
                Les étudiants scannent ce QR Code pour valider leur présence
            </p>

            <div class="btn-row">
                <button onclick="window.print()" class="btn btn-ok">🖨️ Imprimer</button>
                <a th:href="@{/m02/seance/{id}(id=${seance.id})}"
                   class="btn btn-s">← Retour</a>
            </div>

            <div class="refresh-info">
                ⏱ Ce QR Code est valide uniquement pendant la séance en cours
            </div>

        </div>
    </div>
</div>

<script th:inline="javascript">
    var token = [[${seance.qrCodeToken}]];
    var seanceId = [[${seance.id}]];

    if (token) {
        var qrData = window.location.origin
            + '/m02/etudiant/scanner-qr?token=' + token;

        new QRCode(document.getElementById("qrcode-canvas"), {
            text: qrData,
            width: 200,
            height: 200,
            colorDark: "#000000",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
        });
    }
</script>
</body>
</html>
