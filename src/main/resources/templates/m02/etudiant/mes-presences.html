<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes présences - ASMACS</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-slate-50 text-slate-950">
<main class="mx-auto max-w-6xl px-6 py-8">
  <div class="flex flex-col justify-between gap-4 md:flex-row md:items-end">
    <div>
      <p class="text-xs font-semibold uppercase tracking-wide text-blue-700">Espace étudiant</p>
      <h1 class="text-3xl font-bold">Mes présences</h1>
      <p class="mt-2 text-slate-600" th:if="${eleve != null}" th:text="${eleve.nom + ' ' + eleve.prenom}">Élève</p>
    </div>
    <a class="rounded border bg-white px-3 py-2 text-sm font-semibold hover:bg-slate-100" href="/dashboard">Dashboard</a>
  </div>

  <div th:if="${succes}" class="mt-4 rounded border border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-800" th:text="${succes}"></div>
  <div th:if="${erreur}" class="mt-4 rounded border border-red-200 bg-red-50 px-4 py-3 text-red-800" th:text="${erreur}"></div>

  <section class="mt-6 grid gap-4 md:grid-cols-5">
    <div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Taux</p><p class="mt-2 text-3xl font-bold text-blue-700" th:text="${stats != null ? stats.tauxPresence + '%' : '0%'}">0%</p></div>
    <div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Présences</p><p class="mt-2 text-3xl font-bold text-emerald-700" th:text="${stats != null ? stats.nbPresents : 0}">0</p></div>
    <div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Absences</p><p class="mt-2 text-3xl font-bold text-red-700" th:text="${stats != null ? stats.nbAbsents : 0}">0</p></div>
    <div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Retards</p><p class="mt-2 text-3xl font-bold text-amber-700" th:text="${stats != null ? stats.nbRetards : 0}">0</p></div>
    <div class="rounded-lg border bg-white p-4 shadow-sm"><p class="text-sm text-slate-500">Fraudes</p><p class="mt-2 text-3xl font-bold text-red-700" th:text="${stats != null ? stats.nbFraudes : 0}">0</p></div>
  </section>

  <form class="mt-6 rounded-lg border bg-white p-4 shadow-sm" action="/m02/etudiant/scanner-qr" method="post">
    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
    <label class="text-sm font-semibold" for="token">Scanner / saisir un token QR</label>
    <div class="mt-2 flex gap-2">
      <input id="token" class="flex-1 rounded border-slate-300" name="token" placeholder="Token QR de la séance" required>
      <button class="rounded bg-blue-700 px-5 py-2 font-semibold text-white">Valider</button>
    </div>
  </form>

  <section class="mt-6 overflow-hidden rounded-lg border bg-white shadow-sm">
    <table class="w-full text-left text-sm">
      <thead class="bg-slate-100 text-xs uppercase text-slate-600">
      <tr><th class="px-4 py-3">Date</th><th class="px-4 py-3">Matière</th><th class="px-4 py-3">Classe</th><th class="px-4 py-3">Arrivée</th><th class="px-4 py-3">Statut</th><th class="px-4 py-3">Justifier</th></tr>
      </thead>
      <tbody class="divide-y">
      <tr th:if="${#lists.isEmpty(presences)}"><td colspan="6" class="px-4 py-8 text-center text-slate-500">Aucune présence enregistrée.</td></tr>
      <tr th:each="p : ${presences}" class="hover:bg-slate-50">
        <td class="px-4 py-3" th:text="${p.dateSeanceFormatee ?: '-'}">Date</td>
        <td class="px-4 py-3" th:text="${p.matiereNom ?: '-'}">Matière</td>
        <td class="px-4 py-3" th:text="${p.classeNom ?: '-'}">Classe</td>
        <td class="px-4 py-3" th:text="${p.heureArrivee ?: '-'}">-</td>
        <td class="px-4 py-3"><span class="rounded-full bg-slate-100 px-2 py-1 text-xs font-semibold" th:text="${p.statut}">STATUT</span></td>
        <td class="px-4 py-3">
          <form class="flex gap-2" th:if="${p.absent}" th:action="@{/m02/etudiant/justifier/{id}(id=${p.id})}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
            <input class="w-40 rounded border-slate-300 text-sm" name="motif" placeholder="Motif" required>
            <button class="rounded border px-3 py-1.5 hover:bg-slate-100">Envoyer</button>
          </form>
          <span th:unless="${p.absent}" class="text-slate-400">-</span>
        </td>
      </tr>
      </tbody>
    </table>
  </section>
</main>
</body>
</html>
